# Pre-commit hooks for guard0-ai / sec-poc-org repos.
#
# Per-developer setup (one-time):
#   brew install pre-commit gitleaks   # macOS; see https://pre-commit.com/#install for other OSes
#   pre-commit install                  # in the repo root, sets up .git/hooks/pre-commit
#
# Once installed, every `git commit` runs the hooks against the staged changes
# and blocks the commit if any hook fails.

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
