name: Nightly Secret Scan

on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC daily
  workflow_dispatch:

jobs:
  scan:
    uses: sec-poc-org/.github/.github/workflows/reusable-nightly-trufflehog.yml@main
    secrets: inherit
    with:
      # PoC only — surface pattern matches without requiring live verification.
      # Production trigger workflows should omit this line to keep the --only-verified default.
      trufflehog-extra-args: ''
